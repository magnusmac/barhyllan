<style>
  :root{
    --bg:#17110c;
    --panel:#211811;
    --panel-2:#2b2016;
    --line:#4d3a26;
    --brass:#c79a4b;
    --brass-dim:#8f6f37;
    --amber:#b5722e;
    --cream:#ede4d3;
    --muted:#d3c1a2;
    --muted-2:#ac9576;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(120% 60% at 50% -10%, #241a11 0%, var(--bg) 55%) fixed;
    color:var(--cream);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* ---- Header ---- */
  header{
    text-align:center;
    padding:clamp(2.2rem,6vw,4rem) 1rem 1.4rem;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .eyebrow{
    font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--brass-dim);font-weight:600;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-size:clamp(2.4rem,7vw,4.4rem);
    letter-spacing:.02em;
    color:var(--cream);
    margin:.35rem 0 .3rem;
    line-height:1;
  }
  h1 .amp{color:var(--brass);font-style:italic}
  .sub{color:var(--muted);font-size:.95rem;max-width:38ch;margin:0 auto}

  /* ---- Controls ---- */
  .controls{
    position:sticky;top:0;z-index:20;
    background:#17110c;
    border-bottom:1px solid var(--line);
    padding:.9rem 1rem;
  }
  .controls-inner{max-width:1120px;margin:0 auto}
  .searchbar{position:relative;margin-bottom:.75rem}
  .searchbar svg{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;stroke:var(--muted-2);
    pointer-events:none;
  }
  #search{
    width:100%;padding:.85rem 1rem .85rem 2.7rem;
    background:var(--panel);
    border:1px solid var(--line);border-radius:12px;
    color:var(--cream);font-size:1rem;font-family:inherit;
    transition:border-color .15s, box-shadow .15s;
  }
  #search::placeholder{color:var(--muted-2)}
  #search:focus{outline:none;border-color:var(--brass-dim);box-shadow:0 0 0 3px rgba(199,154,75,.15)}

  .chips{display:flex;gap:.5rem;align-items:center;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;scroll-snap-type:x proximity}
  .chips::-webkit-scrollbar{display:none}
  .chip{scroll-snap-align:start}
  @media(min-width:700px){.chips{flex-wrap:wrap;overflow:visible}}
  .chip{
    font-family:inherit;font-size:.9rem;font-weight:600;
    padding:.48rem .85rem;border-radius:999px;cursor:pointer;
    background:rgba(199,154,75,.06);color:var(--muted);
    border:1px solid var(--line);
    transition:all .15s;white-space:nowrap;
  }
  .chip:hover{border-color:var(--brass-dim);color:var(--cream)}
  .chip.active{background:var(--brass);color:#1a1209;border-color:var(--brass);font-weight:600}
  .chip .n{opacity:.6;font-variant-numeric:tabular-nums;margin-left:.3em}
  .chip.active .n{opacity:.75}

  .count{
    max-width:1120px;margin:1.1rem auto .2rem;padding:0 1rem;
    font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);
  }

  /* ---- Grid ---- */
  main{max-width:1120px;margin:0 auto;padding:.6rem 1rem 4rem}
  .grid{
    display:grid;gap:.85rem;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  }
  .card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:14px;
    padding:1.05rem 1.1rem 1.1rem;
    position:relative;overflow:hidden;
    transition:transform .12s ease, border-color .15s;
  }
  .card:hover{transform:translateY(-2px);border-color:var(--brass-dim)}
  /* wax-seal family dot */
  .card::before{
    content:"";position:absolute;top:1.15rem;right:1.1rem;
    width:11px;height:11px;border-radius:50%;
    background:var(--dot,var(--brass));
    box-shadow:0 0 0 3px rgba(0,0,0,.25);
  }
  .card .cat{
    font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--dot,var(--brass));font-weight:600;
  }
  .card h3{
    font-family:Georgia,serif;font-weight:700;
    font-size:1.18rem;line-height:1.15;color:var(--cream);
    margin:.28rem 2rem .5rem 0;
  }
  .meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.6rem}
  .tag{
    font-size:.78rem;padding:.22rem .58rem;border-radius:6px;
    background:rgba(199,154,75,.14);border:1px solid var(--line);
    color:var(--muted);white-space:nowrap;
  }
  .tag.age{color:var(--brass);border-color:rgba(199,154,75,.3)}
  .tag.price{color:var(--brass);border-color:rgba(199,154,75,.3);font-variant-numeric:tabular-nums}
  .notes{font-size:.94rem;color:var(--muted);line-height:1.5}
  .recept{margin-top:.8rem;padding-top:.7rem;border-top:1px dashed var(--line)}
  .rlabel{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);font-weight:700;margin-bottom:.2rem}
  .ring{font-size:.9rem;color:var(--cream);line-height:1.45;margin-bottom:.6rem}
  .rmet{font-size:.86rem;color:var(--muted);line-height:1.5}

  .empty{
    text-align:center;padding:4rem 1rem;color:var(--muted-2);
    grid-column:1/-1;
  }
  .empty strong{display:block;color:var(--muted);font-size:1.1rem;margin-bottom:.4rem;font-family:Georgia,serif}

  footer{
    text-align:center;padding:2rem 1rem 3rem;
    color:var(--muted-2);font-size:.78rem;border-top:1px solid var(--line);
  }
  mark{background:rgba(199,154,75,.35);color:var(--cream);border-radius:2px;padding:0 1px}

  @media(max-width:520px){
    .grid{grid-template-columns:1fr}
    h1{font-size:2.6rem}
    .controls{padding:.65rem .8rem}
    .searchbar{margin-bottom:.55rem}
    header{padding-top:1.6rem}
  }
</style>
</head>

  <h1>Sprit <span class="amp">&amp;</span> Sort</h1>

  // ===== Cocktails (Lottas drinkmeny) =====
  {namn:"Gin & Tonic", kat:"Cocktail", region:"Gin", land:"", alder:"", styrka:"", recept:"4 cl gin · tonic water · isbitar · lime eller citron · ev. färsk timjan", metod:"1. Fyll ett highballglas med isbitar. 2. Mät upp och häll på 4 cl gin. 3. Fyll upp med tonic water. 4. Garnera med citron- eller limeskiva och ev. en kvist timjan.", smak:"En god och avvägd klassiker — gin och tonic i perfekt balans."},
  {namn:"White Lady", kat:"Cocktail", region:"Gin", land:"", alder:"", styrka:"", recept:"3 cl gin · 2 cl Cointreau · 2 cl citronjuice · Frothee · is", metod:"1. Skaka alla ingredienser hårt i shaker, först utan is, sedan med is för bästa skumkrona. 2. Häll upp över sil i ett cocktailglas och garnera med citroncest.", smak:"Gin, apelsinlikör och citron. Sägs skapad på Harry's Bar i Paris — Helan & Halvans favorit."},
  {namn:"Negroni", kat:"Cocktail", region:"Gin", land:"", alder:"", styrka:"", recept:"2 cl Hernö gin · 1,5 cl Campari · 1,5 cl Mancino Vermouth · squeeze apelsinzest · is", metod:"1. Mät upp och blanda gin, bitter och vermouth i shaker eller rörglas med is. 2. Rör ihop och sila drinken i ett fint glas med iskuber. 3. Garnera med en twist apelsinskal och/eller en apelsinskiva.", smak:"Gin, Campari och söt vermouth. Elegant och bitter — först mixad ca 1919 på Caffè Casoni."},
  {namn:"White Russian", kat:"Cocktail", region:"Vodka", land:"", alder:"", styrka:"", recept:"3 cl kaffelikör · 3 cl vodka · 3 cl grädde", metod:"1. Häll i vodka och kaffelikör i ett lågt glas med is. 2. Toppa med grädde. 3. Njut!", smak:"Vodka, kaffelikör och grädde. Kultstatus tack vare The Big Lebowski."},
  {namn:"Bloody Mary", kat:"Cocktail", region:"Vodka", land:"", alder:"", styrka:"", recept:"5 cl vodka · 15 cl tomatjuice · 1 stänk tabasco · 1 stänk worcestershiresås · ½ varv salt · 1 varv svartpeppar · 1 stjälk selleri · 1 citronskiva · is", metod:"1. Häll vodka, tomatjuice, tabasco, worcestershiresås och salt i en shaker och skaka med is. 2. Häll ner i ett högt glas och mal över lite svartpeppar. 3. Dekorera med en selleristjälk och en citronskiva.", smak:"Vodka och kryddad tomatjuice. Klassisk brunchdrink uppkallad efter drottning Mary I."},
  {namn:"Mojito", kat:"Cocktail", region:"Rom", land:"", alder:"", styrka:"", recept:"5 cl ljus rom · 2 cl limejuice · 2 cl sockerlag · sodavatten · färsk mynta", metod:"1. Muddla färsk mynta tillsammans med pressad limejuice. 2. Blanda muddlad mynta och limejuice med sockerlag och ljus rom i ett högt glas. 3. Toppa glaset med sodavatten och isbitar. 4. Garnera med mynta och lime.", smak:"Ljus rom, lime, mynta, socker och soda. Kubansk klassiker för soliga kvällar."},
  {namn:"Dark & Stormy", kat:"Cocktail", region:"Rom", land:"", alder:"", styrka:"", recept:"5 cl mörk rom (Angostura) · 2 cl färskpressad limejuice · 20 cl ginger beer", metod:"1. Pressa limejuice. 2. Blanda samtliga ingredienser och servera med en limeklyfta. Inte svårare än så!", smak:"Mörk rom och ingefärsöl. Bermudas officiella cocktail, född i Royal Navy på 1800-talet."},
  {namn:"Whiskey Sour", kat:"Cocktail", region:"Whiskey", land:"", alder:"", styrka:"", recept:"5 cl Maker's Mark · 2 cl citronjuice · 1,5 cl sockerlag · Frothee (för skum) · isbitar · 1 citronskiva till garnering", metod:"1. Kyl gärna dina on-the-rocks-glas medan du blandar. 2. Häll whisky, juice, sockerlag och lite Frothee i en shaker. 3. Tillsätt lite is och skaka. 4. Sila av drinken ner i glasen. 5. Garnera gärna med citronskiva.", smak:"Whiskey, citrus och socker. En av världens äldsta drinkstilar — i tryck första gången 1862."},
  {namn:"Gin Sour", kat:"Cocktail", region:"Gin", land:"", alder:"", styrka:"", recept:"40 ml Bombay · 20 ml citronjuice · 20 ml sockerlag · 10 ml äggvita", metod:"1. Häll Bombay, citronjuice, sockerlag och äggvita i en shaker. 2. Skaka utan is. Tillsätt is och skaka kraftigt. 3. Sila ner i ett whiskyglas fyllt med is.", smak:"Gin, citron och socker skakat med äggvita som ger ett vackert skum."},
  {namn:"Dry Martini", kat:"Cocktail", region:"Gin", land:"", alder:"", styrka:"", recept:"5 cl gin (väl kyld) · 1 cl torr vermouth (väl kyld) · is · oliv", metod:"1. Kyl ett martiniglas innan du blandar. 2. Mät upp gin och torr vermouth i ett glas med is eller i en shaker med is — skakad som James Bond, eller rörd. 3. Skaka eller rör och sila ner i det välkylda glaset. 4. Dekorera med en oliv eller två på en tandpetare.", smak:"Torr gin och torr vermouth. Världens mest ikoniska cocktail, i nuvarande form sedan ca 1905."},
  {namn:"Moscow Mule", kat:"Cocktail", region:"Vodka", land:"", alder:"", styrka:"", recept:"5 cl vodka · 2 cl limejuice · 3 stänk Angostura Bitter · ginger beer att toppa med · is · limeklyftor och mynta till garnering", metod:"1. Lägg is i glas eller kopparmugg. 2. Häll på de första ingredienserna och toppa försiktigt med ginger beer. 3. Garnera med en limeklyfta och färsk mynta.", smak:"Vodka, ingefära och lime i kopparmugg. Fräsch och kryddig som en åsnespark."},
  {namn:"Lottas Frozen Strawberry Daiquiri", kat:"Cocktail", region:"Rom", land:"", alder:"", styrka:"", recept:"kross-is · jordgubbspuré · 2 cl pressad limejuice · 1 cl sockerlag · 4 cl vit rom · 5–8 cl Sprite", metod:"1. Häll samtliga ingredienser i ett vinglas tillsammans med krossad is (halva glaset). 2. Blanda allt och fyll på med kross-is upp till kanten. Toppa med Sprite och garnera med jordgubbe/citron.", smak:"Husets modernare, frusna variant på daiquirin — Hemingways och JFK:s favoritdrink."},
  {namn:"Caipirinha", kat:"Cocktail", region:"Cachaça", land:"", alder:"", styrka:"", recept:"5 cl ljus rom · 1 lime · 2,5 tsk råsocker · krossad is", metod:"1. Muddla limeklyftor och socker tillsammans i glaset. 2. Fyll upp halva glaset med krossad is och tillsätt rom, rör om. 3. Fyll upp med mer krossad is och garnera med en limeklyfta.", smak:"Cachaça, lime och socker. Traditionell brasiliansk klassiker med anor från tidigt 1900-tal."},
  {namn:"Old Fashioned", kat:"Cocktail", region:"Whiskey", land:"", alder:"", styrka:"", recept:"5 cl Maker's Mark · 1 cl råsockerlag · 3 skvättar Angostura", metod:"1. Rör alla ingredienser med is för att kyla ner och tillföra vatten från isen. 2. Servera i ett kallt glas med is, garnera med apelsinzest.", smak:"Whiskey, socker och bitters. Gjorde comeback via Mad Men — lika aktuell som för 150 år sedan."},
  {namn:"Amaretto Sour", kat:"Cocktail", region:"Amaretto", land:"", alder:"", styrka:"", recept:"5 cl Amaretto · 3 cl citronjuice · 2 cl sockerlag · 1 cl Frothee", metod:"1. Häll samtliga ingredienser i en shaker. 2. Torrskaka sedan hårt. 3. Skaka därefter med is. 4. Sila upp i ett glas fyllt med is.", smak:"Söt, aningen bitter amaretto som gifter sig med frisk citron. Omtyckt medlem i sour-familjen."},

  {namn:"Westmalle Dubbel", kat:"Öl", region:"Trappist Dubbel", land:"Belgien", alder:"", styrka:"7,0%", smak:"Klassisk trappistdubbel. Mörk och maltig med russin, karamell och kryddiga jästtoner."},
  {namn:"Tripel Karmeliet", kat:"Öl", region:"Belgisk Tripel", land:"Belgien", alder:"", styrka:"8,4%", smak:"Bryggd på korn, vete och havre. Citrus, banan och vanilj med kryddig, torr avslutning."},
  {namn:"Sitting Bulldog IPA", kat:"Öl", region:"American IPA", land:"Gotlands Bryggeri", alder:"", styrka:"6,4%", smak:"Kopparfärgad IPA på 100% amerikansk humle. Fruktiga och pinjiga toner med solid, torr beska."},
  {namn:"Sleepy Bulldog Pale Ale", kat:"Öl", region:"English Pale Ale", land:"Gotlands Bryggeri", alder:"", styrka:"4,8%", smak:"Humlearomatisk engelsk pale ale. Aprikos, apelsinskal, örter och knäckebröd med mild pinjebeska."}
];

/* ---------- Kategori-ordning för chips ---------- */
const CATS = ["Skotsk single malt","Skotsk blend","Irländsk whiskey","Japansk whisky","Nordisk whisky","Rom","Gin","Tequila","Likör & övrigt","Vitt vin","Mousserande","Rött vin","Sött & portvin","Cocktail","Öl"];

/* ---------- State ---------- */
let activeCat = "Alla";
let query = "";

const grid = document.getElementById("grid");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");
const searchEl = document.getElementById("search");

/* ---------- Bygg chips ---------- */
function buildChips(){
  const counts = {};
  CATS.forEach(c => counts[c] = DATA.filter(d => d.kat === c).length);
  let html = `<button class="chip active" data-cat="Alla">Alla<span class="n">${DATA.length}</span></button>`;
  CATS.forEach(c => {
    html += `<button class="chip" data-cat="${c}">${c}<span class="n">${counts[c]}</span></button>`;
  });
  chipsEl.innerHTML = html;
  chipsEl.querySelectorAll(".chip").forEach(btn=>{
    btn.addEventListener("click",()=>{
      activeCat = btn.dataset.cat;
      chipsEl.querySelectorAll(".chip").forEach(b=>b.classList.toggle("active", b===btn));
      render();
    });
  });
}

/* ---------- Highlight sökträff ---------- */
function hl(text, q){
  if(!q) return escapeHtml(text);
  const safe = escapeHtml(text);
  const re = new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
  return safe.replace(re,"<mark>$1</mark>");
}
function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}

/* ---------- Render ---------- */
function render(){
  const q = query.trim().toLowerCase();
  let items = DATA.filter(d=>{
    if(activeCat!=="Alla" && d.kat!==activeCat) return false;
    if(!q) return true;
    return (d.namn+" "+d.kat+" "+d.region+" "+d.land+" "+d.alder+" "+(d.pris||"")+" "+d.smak+" "+(d.recept||"")+" "+(d.metod||"")).toLowerCase().includes(q);
  });

  countEl.textContent = items.length + (items.length===1 ? " sort" : " sorter") + (activeCat!=="Alla" ? " · "+activeCat : "");

  if(items.length===0){
    grid.innerHTML = `<div class="empty"><strong>Inga träffar</strong>Prova ett annat sökord eller välj “Alla”.</div>`;
    return;
  }

  items.sort((a,b)=>a.namn.localeCompare(b.namn,"sv"));

  grid.innerHTML = items.map(d=>{
    const color = FAMILY_COLOR[d.kat] || "#c79a4b";
    const tags = [];
    if(d.region) tags.push(`<span class="tag">${escapeHtml(d.region)}</span>`);
    if(d.land && d.land!==d.region) tags.push(`<span class="tag">${escapeHtml(d.land)}</span>`);
    if(d.alder) tags.push(`<span class="tag age">${escapeHtml(d.alder)}</span>`);
    if(d.styrka) tags.push(`<span class="tag">${escapeHtml(d.styrka)}</span>`);
    if(d.pris) tags.push(`<span class="tag price">${escapeHtml(d.pris)}</span>`);
    return `<article class="card" style="--dot:${color}">
      <div class="cat">${escapeHtml(d.kat)}</div>
      <h3>${hl(d.namn,q)}</h3>
      <div class="meta">${tags.join("")}</div>
      <p class="notes">${hl(d.smak,q)}</p>
      ${d.recept?`<div class="recept">
        <div class="rlabel">Ingredienser</div>
        <p class="ring">${hl(d.recept,q)}</p>
        <div class="rlabel">Gör så här</div>
        <p class="rmet">${hl(d.metod||"",q)}</p>
      </div>`:""}
    </article>`;
  }).join("");
}

searchEl.addEventListener("input", e=>{query = e.target.value; render();});
buildChips();
render();
</script>
</body>
</html>
